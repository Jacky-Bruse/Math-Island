services:
  web:
    build: .
    ports:
      - "80:80"
    depends_on:
      - tts-api
    restart: unless-stopped

  tts-api:
    build: ./tts-service
    volumes:
      - tts-data:/app/data
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
    restart: unless-stopped

volumes:
  tts-data:
