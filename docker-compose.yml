services:
  web:
    container_name: morning-star
    image: ${MORNING_STAR_IMAGE:-your-dockerhub-username/morning-star:latest}
    ports:
      - "80:80"
    volumes:
      - tts-data:/app/tts-service/data
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
    restart: unless-stopped

volumes:
  tts-data:
