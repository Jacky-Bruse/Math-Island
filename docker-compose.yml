services:
  web:
    container_name: math-island
    image: ${MATH_ISLAND_IMAGE:-your-dockerhub-username/math-island:latest}
    ports:
      - "80:80"
    volumes:
      - tts-data:/app/tts-service/data
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
    restart: unless-stopped

volumes:
  tts-data:
