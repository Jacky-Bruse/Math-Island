<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <script>
      // 防首屏闪烁：样式表评估前根据存储的主题给 <html> 挂 .dark。
      // 分支逻辑须与 src/lib/theme.ts 的 applyTheme 完全一致。
      (function () {
        // theme 解析与回退须与运行时一致：解析失败也回退 'system'（而非浅色），
        // 否则深色系统设备上会出现首屏浅色、水合后翻深色的闪烁。
        var theme = 'system'
        try {
          var raw = localStorage.getItem('math-island:settings')
          if (raw) { var t = JSON.parse(raw).theme; if (t) theme = t }
        } catch (e) { theme = 'system' }
        try {
          var isDark = theme === 'dark' || (theme === 'system' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches)
          if (isDark) document.documentElement.classList.add('dark')
        } catch (e) { /* matchMedia 不可用则回退浅色 */ }
      })()
    </script>
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#5B9BD5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <title>启明星</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
